apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-optimizer-backend
  labels:
    app: flight-optimizer-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flight-optimizer-backend
  template:
    metadata:
      labels:
        app: flight-optimizer-backend
    spec:
      containers:
      - name: backend
        image: hridayesh68/flight-optimizer-dsa-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: flight-db-secret
              key: mongo-uri
        - name: PORT
          value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: flight-optimizer-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30500
  type: NodePort
